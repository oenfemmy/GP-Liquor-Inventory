<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GP Liquor Inventory Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0ea;
    --surface: #ede6db;
    --card: #ffffff;
    --border: #ddd4c6;
    --gold: #a0742a;
    --gold-light: #7a5520;
    --cream: #2c2218;
    --muted: #8a7a68;
    --red-wine: #8b2635;
    --white-wine: #7a6010;
    --whisky: #a04510;
    --sake: #6a6058;
    --champagne: #9a7820;
    --baijiu: #2a6a48;
    --cigarette: #555555;
    --danger: #c0392b;
    --success: #1e8449;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Jost', sans-serif;
    background: var(--bg);
    color: var(--cream);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #fff8f0 0%, #f5f0ea 60%);
    border-bottom: 2px solid var(--border);
    padding: 28px 40px 22px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .logo-area h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--gold-light);
  }
  .logo-area p {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }
  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    border-radius: 3px;
    font-family: 'Jost', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }
  .btn-primary {
    background: var(--gold);
    color: #ffffff;
  }
  .btn-primary:hover { background: var(--gold-light); }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  /* MAIN LAYOUT */
  .container { max-width: 1400px; margin: 0 auto; padding: 30px 40px; }

  /* SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 12px;
    margin-bottom: 30px;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: 3px solid;
    border-radius: 4px;
    padding: 16px 14px 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .summary-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .summary-card.active { box-shadow: 0 0 0 1px var(--gold); }
  .summary-card .label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .summary-card .count {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    line-height: 1;
  }
  .summary-card .sublabel {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 4px;
  }
  .card-red { border-top-color: var(--red-wine); }
  .card-red .count { color: #8b2635; }
  .card-white { border-top-color: var(--white-wine); }
  .card-white .count { color: #7a6010; }
  .card-whisky { border-top-color: var(--whisky); }
  .card-whisky .count { color: #a04510; }
  .card-sake { border-top-color: var(--sake); }
  .card-sake .count { color: #5a5048; }
  .card-champagne { border-top-color: var(--champagne); }
  .card-champagne .count { color: #9a7820; }
  .card-baijiu { border-top-color: var(--baijiu); }
  .card-baijiu .count { color: #2a6a48; }
  .card-cigarette { border-top-color: var(--cigarette); }
  .card-cigarette .count { color: #555; }

  /* CONTROLS */
  .controls {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 240px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 9px 14px 9px 36px;
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--gold); }
  .search-box input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
  }
  select {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 9px 14px;
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-size: 0.82rem;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--gold); }
  .count-badge {
    font-size: 0.75rem;
    color: var(--muted);
    margin-left: auto;
  }

  /* TABLE */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr {
    background: #f0ebe2;
    border-bottom: 2px solid var(--border);
  }
  th {
    padding: 12px 16px;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: var(--gold); }
  th .sort-arrow { opacity: 0.4; font-size: 10px; margin-left: 4px; }
  th.sorted { color: var(--gold); }
  th.sorted .sort-arrow { opacity: 1; }
  tbody tr {
    border-bottom: 1px solid rgba(58,46,36,0.4);
    transition: background 0.15s;
  }
  tbody tr:hover { background: rgba(160,116,42,0.05); }
  tbody tr:last-child { border-bottom: none; }
  td {
    padding: 11px 16px;
    font-size: 0.84rem;
    color: #4a3c2e;
  }
  td.item-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.98rem;
    font-style: italic;
    color: #2c2218;
    max-width: 320px;
  }
  td.type-cell {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
  }
  .type-pill {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.67rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .pill-red { background: rgba(139,38,53,0.1); color: #8b2635; border: 1px solid rgba(139,38,53,0.3); }
  .pill-white { background: rgba(122,96,16,0.1); color: #7a6010; border: 1px solid rgba(122,96,16,0.3); }
  .pill-whisky { background: rgba(160,69,16,0.1); color: #a04510; border: 1px solid rgba(160,69,16,0.3); }
  .pill-sake { background: rgba(106,96,88,0.1); color: #5a5048; border: 1px solid rgba(106,96,88,0.25); }
  .pill-champagne { background: rgba(154,120,32,0.1); color: #9a7820; border: 1px solid rgba(154,120,32,0.3); }
  .pill-baijiu { background: rgba(42,106,72,0.1); color: #2a6a48; border: 1px solid rgba(42,106,72,0.3); }
  .pill-cigarette { background: rgba(85,85,85,0.08); color: #555; border: 1px solid rgba(85,85,85,0.2); }

  td.qty-cell {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    text-align: center;
  }
  .qty-zero { color: var(--danger); }
  .qty-low { color: #c0640a; }
  .qty-ok { color: #2c2218; }
  .qty-good { color: var(--success); }

  td.price-cell { font-size: 0.82rem; color: var(--muted); }
  td.remark-cell { font-size: 0.75rem; color: var(--muted); font-style: italic; }

  .edit-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 3px;
    color: var(--muted);
    padding: 3px 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .edit-btn:hover { border-color: var(--gold); color: var(--gold); }
  .del-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 3px;
    color: var(--muted);
    padding: 3px 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .del-btn:hover { border-color: var(--danger); color: var(--danger); }
  .action-cell { white-space: nowrap; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state p { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 520px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(20px);
    transition: transform 0.25s;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    padding: 24px 28px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    color: var(--gold-light);
    letter-spacing: 0.06em;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }
  .modal-close:hover { color: var(--cream); }
  .modal-body { padding: 24px 28px; }
  .form-row { margin-bottom: 18px; }
  .form-row label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 13px;
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--gold); }
  .form-row textarea { resize: vertical; min-height: 70px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .modal-footer {
    padding: 16px 28px 24px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* MOVEMENT LOG IN TABLE */
  .movement-section {
    background: var(--surface);
    border-radius: 4px;
    padding: 14px 16px;
    margin-top: 16px;
    border: 1px solid var(--border);
  }
  .movement-section h4 {
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .movement-item {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }
  .movement-item:last-child { border-bottom: none; }
  .movement-item .mv-date { color: var(--muted); }
  .movement-item .mv-change { font-weight: 500; }
  .mv-in { color: var(--success); }
  .mv-out { color: var(--danger); }

  /* FOOTER STAT */
  .footer-stats {
    margin-top: 16px;
    display: flex;
    gap: 20px;
    align-items: center;
    font-size: 0.75rem;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .footer-stats span strong { color: var(--gold); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #ffffff;
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 12px 20px;
    font-size: 0.82rem;
    color: var(--cream);
    z-index: 2000;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 900px) {
    .container { padding: 20px; }
    header { padding: 18px 20px 14px; flex-direction: column; align-items: flex-start; gap: 12px; }
    .summary-grid { grid-template-columns: repeat(4,1fr); }
  }
  @media (max-width: 600px) {
    .summary-grid { grid-template-columns: repeat(2,1fr); }
  }

  .partial-opt {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--cream);
    transition: all 0.15s;
    user-select: none;
  }
  .partial-opt:has(input:checked) {
    background: var(--gold);
    border-color: var(--gold);
    color: #fff;
    font-weight: 500;
  }
  .partial-opt input[type="radio"] { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <h1>GP Liquor Inventory</h1>
    <p>Private Collection · Stock Management</p>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="exportCSV()">⬇ Export CSV</button>
    <button class="btn btn-primary" onclick="openModal()">+ Add Item</button>
  </div>
</header>

<div class="container">

  <!-- SUMMARY CARDS -->
  <div class="summary-grid" id="summaryGrid"></div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by name, type, remarks…" oninput="renderTable()">
    </div>
    <select id="typeFilter" onchange="renderTable()">
      <option value="">All Categories</option>
      <option>Red Wine</option>
      <option>White Wine</option>
      <option>Whisky</option>
      <option>Sake</option>
      <option>Champagne</option>
      <option>Baijiu</option>
      <option>Cigarette</option>
    </select>
    <select id="stockFilter" onchange="renderTable()">
      <option value="">All Stock Status</option>
      <option value="instock">✅ In Stock</option>
      <option value="zero">❌ Out of Stock</option>
    </select>
    <select id="sortField" onchange="renderTable()">
      <option value="no">Sort: #</option>
      <option value="type">Sort: Type</option>
      <option value="item">Sort: Name</option>
      <option value="qty">Sort: Qty</option>
      <option value="price">Sort: Price</option>
    </select>
    <span class="count-badge" id="countBadge"></span>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('no')">#<span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('type')">Category<span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('item')">Item<span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('qty')" style="text-align:center">Qty<span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('price')">Price / Bottle<span class="sort-arrow">↕</span></th>
          <th>Remarks</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">
      <p>No items match your search.</p>
    </div>
  </div>

  <div class="footer-stats" id="footerStats"></div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add New Item</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editIndex" value="">
      <div class="form-row">
        <label>Category</label>
        <select id="fType">
          <option>Red Wine</option>
          <option>White Wine</option>
          <option>Whisky</option>
          <option>Sake</option>
          <option>Champagne</option>
          <option>Baijiu</option>
          <option>Cigarette</option>
        </select>
      </div>
      <div class="form-row">
        <label>Item Name</label>
        <input type="text" id="fItem" placeholder="e.g. 2019, Louis Jadot Corton Grand Cru">
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label>Quantity (Whole Bottles)</label>
          <input type="number" id="fQty" placeholder="0" min="0" step="1" value="0">
        </div>
        <div class="form-row">
          <label>Price / Bottle (IDR)</label>
          <input type="number" id="fPrice" placeholder="0" min="0" step="1000">
        </div>
      </div>
      <div class="form-row">
        <label>Partial / Open Bottle</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <label class="partial-opt"><input type="radio" name="fPartial" value="0" checked> <span>None</span></label>
          <label class="partial-opt"><input type="radio" name="fPartial" value="0.25"> <span>¼ bottle</span></label>
          <label class="partial-opt"><input type="radio" name="fPartial" value="0.5"> <span>½ bottle</span></label>
          <label class="partial-opt"><input type="radio" name="fPartial" value="0.75"> <span>¾ bottle</span></label>
        </div>
      </div>

      <div class="movement-section" id="movementSection">
        <h4>Stock Movement Log</h4>
        <div id="movementList"></div>
        <div style="margin-top:12px; display:flex; gap:8px; align-items:center;">
          <input type="number" id="mvAmount" placeholder="e.g. -1 or +2" style="width:120px; background:var(--bg); border:1px solid var(--border); border-radius:3px; padding:7px 10px; color:var(--cream); font-family:'Jost',sans-serif; font-size:0.82rem; outline:none;">
          <input type="text" id="mvNote" placeholder="Note (e.g. April consumed)" style="flex:1; background:var(--bg); border:1px solid var(--border); border-radius:3px; padding:7px 10px; color:var(--cream); font-family:'Jost',sans-serif; font-size:0.82rem; outline:none;">
          <button class="btn btn-outline" style="padding:7px 12px; font-size:0.72rem;" onclick="addMovement()">Add</button>
        </div>
      </div>

      <div class="form-row" style="margin-top:18px;">
        <label>Remarks</label>
        <textarea id="fRemarks" placeholder="e.g. From Pakubuwono, Gift from…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const defaultData = [
  {no:1,type:"Red Wine",item:"1999, Bonnes Mares Grand Cru Domaine G Roumier",qty:1,price:null,remarks:"From Pakubuwono",movements:[]},
  {no:2,type:"Red Wine",item:"2001, Musigny Grand Cru Faiveley",qty:1,price:null,remarks:"From Pakubuwono",movements:[]},
  {no:3,type:"Red Wine",item:"2003, Borgogno Borolo Riserva",qty:1,price:null,remarks:"From Pakubuwono",movements:[]},
  {no:4,type:"Red Wine",item:"2009, Borgorno Barolo Liste",qty:1,price:null,remarks:"From Pakubuwono",movements:[]},
  {no:5,type:"Red Wine",item:"2011, Michele Chiarlo Borolo",qty:1,price:null,remarks:"From Pakubuwono",movements:[]},
  {no:6,type:"Red Wine",item:"2011, Famile Perrin Chateau de Beaucastel",qty:1,price:null,remarks:"From Pakubuwono",movements:[]},
  {no:7,type:"Red Wine",item:"2009 Lascombes Margaux Grand Cru Classe",qty:1,price:null,remarks:"",movements:[]},
  {no:8,type:"Red Wine",item:"2014 Robert Mondavi Cabernet Souvignon",qty:1,price:null,remarks:"",movements:[]},

// Load from localStorage or use defaults
let inventory = JSON.parse(localStorage.getItem('gp_inventory') || 'null') || defaultData;
let currentSort = {field:'no', dir:1};
let filterType = '';
let filterStock = '';
let searchQ = '';
let editingIndex = null;
let tempMovements = [];

function save() {
  localStorage.setItem('gp_inventory', JSON.stringify(inventory));
}

// ─── SUMMARY CARDS ───────────────────────────────────────────────────────────
const categories = [
  {key:"Red Wine",   cls:"card-red",       label:"Red Wine"},
  {key:"White Wine", cls:"card-white",     label:"White Wine"},
  {key:"Whisky",     cls:"card-whisky",    label:"Whisky"},
  {key:"Sake",       cls:"card-sake",      label:"Sake"},
  {key:"Champagne",  cls:"card-champagne", label:"Champagne"},
  {key:"Baijiu",     cls:"card-baijiu",    label:"Baijiu"},
  {key:"Cigarette",  cls:"card-cigarette", label:"Cigarette"},
];

function renderSummary() {
  const grid = document.getElementById('summaryGrid');
  grid.innerHTML = categories.map(c => {
    const items = inventory.filter(i => i.type === c.key);
    const totalQty = items.reduce((s,i) => s + Math.max(0, qtyValue(i.qty, i.partial)), 0);
    const outOfStock = items.filter(i => qtyValue(i.qty, i.partial) <= 0).length;
    const active = filterType === c.key;
    return `<div class="summary-card ${c.cls} ${active?'active':''}" onclick="toggleFilter('${c.key}')">
      <div class="label">${c.label}</div>
      <div class="count">${totalQty}</div>
      <div class="sublabel">${items.length} SKUs · ${outOfStock} empty</div>
    </div>`;
  }).join('');
}

function toggleFilter(type) {
  filterType = filterType === type ? '' : type;
  document.getElementById('typeFilter').value = filterType;
  renderSummary();
  renderTable();
}

// ─── TABLE ───────────────────────────────────────────────────────────────────
const pillClass = {
  "Red Wine":"pill-red","White Wine":"pill-white","Whisky":"pill-whisky",
  "Sake":"pill-sake","Champagne":"pill-champagne","Baijiu":"pill-baijiu","Cigarette":"pill-cigarette"
};
// Returns total numeric value: whole + partial fraction
function qtyValue(qty, partial) {
  const w = parseFloat(qty) || 0;
  const p = parseFloat(partial) || 0;
  return w + p;
}

const PARTIAL_LABEL = { 0:'', 0.25:'¼', 0.5:'½', 0.75:'¾' };

function fmtQty(qty, partial) {
  const w = parseInt(qty) || 0;
  const p = parseFloat(partial) || 0;
  const pLabel = PARTIAL_LABEL[p] || '';
  if(w === 0 && p === 0) return '0';
  if(w === 0 && p > 0) return pLabel;
  if(p > 0) return w + ' + ' + pLabel;
  return String(w);
}

function qtyClass(qty, partial) {
  const v = qtyValue(qty, partial);
  if(v <= 0) return 'qty-zero';
  if(v <= 2) return 'qty-low';
  if(v <= 5) return 'qty-ok';
  return 'qty-good';
}
function fmtPrice(p) {
  if(!p || p <= 0) return '<span style="color:var(--muted)">—</span>';
  return 'IDR ' + Number(p).toLocaleString('id-ID');
}

function sortBy(field) {
  if(currentSort.field === field) currentSort.dir *= -1;
  else { currentSort.field = field; currentSort.dir = 1; }
  document.getElementById('sortField').value = field;
  renderTable();
}

function getFiltered() {
  searchQ = document.getElementById('searchInput').value.toLowerCase();
  filterType = document.getElementById('typeFilter').value;
  filterStock = document.getElementById('stockFilter').value;
  let list = [...inventory];
  if(filterType) list = list.filter(i => i.type === filterType);
  if(filterStock === 'zero') list = list.filter(i => qtyValue(i.qty, i.partial) <= 0);
  else if(filterStock === 'instock') list = list.filter(i => qtyValue(i.qty, i.partial) > 0);
  if(searchQ) list = list.filter(i =>
    i.item.toLowerCase().includes(searchQ) ||
    i.type.toLowerCase().includes(searchQ) ||
    (i.remarks||'').toLowerCase().includes(searchQ)
  );
  const f = currentSort.field, d = currentSort.dir;
  list.sort((a,b) => {
    let av = a[f], bv = b[f];
    if(f === 'price') { av = av||0; bv = bv||0; }
    if(typeof av === 'string') return d * av.localeCompare(bv);
    return d * ((av||0) - (bv||0));
  });
  return list;
}

function renderTable() {
  renderSummary();
  const list = getFiltered();
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  if(list.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = list.map(item => {
      const idx = inventory.indexOf(item);
      return `<tr>
        <td style="color:var(--muted);font-size:0.78rem">${item.no}</td>
        <td class="type-cell"><span class="type-pill ${pillClass[item.type]||''}">${item.type}</span></td>
        <td class="item-name">${item.item}</td>
        <td class="qty-cell ${qtyClass(item.qty, item.partial)}">${fmtQty(item.qty, item.partial)}</td>
        <td class="price-cell">${fmtPrice(item.price)}</td>
        <td class="remark-cell">${item.remarks||'—'}</td>
        <td class="action-cell">
          <button class="edit-btn" onclick="openEdit(${idx})">✏ Edit</button>
          <button class="del-btn" onclick="deleteItem(${idx})">✕</button>
        </td>
      </tr>`;
    }).join('');
  }
  const totalQty = inventory.reduce((s,i) => s + Math.max(0, qtyValue(i.qty, i.partial)), 0);
  const totalValue = inventory.filter(i=>i.price&&i.qty>0).reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById('countBadge').textContent = `${list.length} of ${inventory.length} items`;
  document.getElementById('footerStats').innerHTML = `
    <span>Total items: <strong>${inventory.length}</strong></span>
    <span>Total bottles: <strong>${totalQty}</strong></span>
    <span>Out of stock: <strong style="color:var(--danger)">${inventory.filter(i=>qtyValue(i.qty,i.partial)<=0).length}</strong></span>
    ${totalValue ? `<span>Est. value (priced items): <strong>IDR ${totalValue.toLocaleString('id-ID')}</strong></span>` : ''}
    <span style="margin-left:auto;font-size:0.7rem">Last updated: ${new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}</span>
  `;
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(idx) {
  editingIndex = null;
  tempMovements = [];
  document.getElementById('modalTitle').textContent = 'Add New Item';
  document.getElementById('editIndex').value = '';
  document.getElementById('fType').value = 'Red Wine';
  document.getElementById('fItem').value = '';
  document.getElementById('fQty').value = '';
  document.getElementById('fPrice').value = '';
  document.getElementById('fRemarks').value = '';
  document.getElementById('mvAmount').value = '';
  document.getElementById('mvNote').value = '';
  // reset partial
  const pr = document.querySelector('input[name="fPartial"][value="0"]');
  if(pr) pr.checked = true;
  renderMovements();
  document.getElementById('movementSection').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('open');
}

function openEdit(idx) {
  editingIndex = idx;
  const item = inventory[idx];
  tempMovements = [...(item.movements||[])];
  document.getElementById('modalTitle').textContent = 'Edit Item';
  document.getElementById('editIndex').value = idx;
  document.getElementById('fType').value = item.type;
  document.getElementById('fItem').value = item.item;
  document.getElementById('fQty').value = item.qty;
  document.getElementById('fPrice').value = item.price||'';
  document.getElementById('fRemarks').value = item.remarks||'';
  document.getElementById('mvAmount').value = '';
  document.getElementById('mvNote').value = '';
  document.getElementById('movementSection').style.display = 'block';
  // restore partial
  const pVal = item.partial || 0;
  const pRadio = document.querySelector(`input[name="fPartial"][value="${pVal}"]`);
  if(pRadio) pRadio.checked = true;
  renderMovements();
  document.getElementById('modalOverlay').classList.add('open');
}

function renderMovements() {
  const el = document.getElementById('movementList');
  if(!tempMovements.length) { el.innerHTML = '<div style="font-size:0.75rem;color:var(--muted);padding:4px 0">No movements recorded</div>'; return; }
  el.innerHTML = tempMovements.slice().reverse().map((m,ri) => {
    const i = tempMovements.length - 1 - ri;
    const cls = m.change >= 0 ? 'mv-in' : 'mv-out';
    const sign = m.change >= 0 ? '+' : '';
    return `<div class="movement-item">
      <span class="mv-date">${m.date}</span>
      <span style="flex:1;padding:0 12px;font-size:0.78rem;color:var(--muted)">${m.note||''}</span>
      <span class="mv-change ${cls}">${sign}${m.change}</span>
      <button onclick="removeMovement(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;margin-left:8px;font-size:11px">✕</button>
    </div>`;
  }).join('');
}

function addMovement() {
  const amt = parseInt(document.getElementById('mvAmount').value);
  const note = document.getElementById('mvNote').value.trim();
  if(isNaN(amt)||amt===0) { showToast('Enter a valid movement amount'); return; }
  const today = new Date().toISOString().split('T')[0];
  tempMovements.push({date:today, change:amt, note});
  // also update qty field
  const currentQty = parseInt(document.getElementById('fQty').value)||0;
  document.getElementById('fQty').value = currentQty + amt;
  document.getElementById('mvAmount').value = '';
  document.getElementById('mvNote').value = '';
  renderMovements();
}

function removeMovement(i) {
  const m = tempMovements[i];
  const currentQty = parseInt(document.getElementById('fQty').value)||0;
  document.getElementById('fQty').value = currentQty - m.change;
  tempMovements.splice(i,1);
  renderMovements();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
function closeModalOnBg(e) {
  if(e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveItem() {
  const type = document.getElementById('fType').value;
  const item = document.getElementById('fItem').value.trim();
  const qty = parseInt(document.getElementById('fQty').value)||0;
  const price = parseFloat(document.getElementById('fPrice').value)||null;
  const remarks = document.getElementById('fRemarks').value.trim();
  if(!item) { showToast('Please enter an item name'); return; }
  const idx = document.getElementById('editIndex').value;
  if(idx !== '') {
    inventory[parseInt(idx)] = {...inventory[parseInt(idx)], type, item, qty, price, remarks, movements: tempMovements};
    showToast('Item updated successfully');
  } else {
    const maxNo = inventory.reduce((m,i) => Math.max(m, i.no||0), 0);
    inventory.push({no: 0, type, item, qty, price, remarks, movements: tempMovements});
    reNumber();
    showToast('Item added to inventory');
  }
  save();
  closeModal();
  renderTable();
}

function reNumber() {
  inventory.forEach((item, i) => { item.no = i + 1; });
}

function deleteItem(idx) {
  if(!confirm(`Delete "${inventory[idx].item}"?`)) return;
  inventory.splice(idx, 1);
  reNumber();
  save();
  renderTable();
  showToast('Item deleted');
}

// ─── EXPORT ──────────────────────────────────────────────────────────────────
function exportCSV() {
  const headers = ['No','Type','Item','Qty','Price/Bottle (IDR)','Remarks'];
  const rows = inventory.map(i => [i.no, i.type, `"${i.item}"`, i.qty, i.price||'', `"${i.remarks||''}"`]);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `GP_Liquor_Inventory_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  showToast('CSV exported');
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
document.getElementById('typeFilter').addEventListener('change', () => {
  filterType = document.getElementById('typeFilter').value;
  renderSummary();
  renderTable();
});
renderSummary();
renderTable();
